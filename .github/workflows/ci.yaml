name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs on the same PR/branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # hassfest — HA's official manifest/strings validator.
  #
  # Currently INFORMATIONAL (continue-on-error). Three known errors are
  # accepted as long-standing project decisions:
  #   1. "Domain does not match dir name" — `iaqualinkRobots` (camelCase) vs.
  #      directory `iaqualink_robots`. Renaming would require migrating every
  #      user's entity registry; deliberately deferred.
  #   2. "extra keys not allowed @ data['homeassistant']" — newer hassfest
  #      rejects the top-level `homeassistant` field in manifest.json; this is
  #      a real issue to fix (see story M16) but not blocking releases.
  #   3. "Invalid translations/en.json: extra keys not allowed @ data['entity']
  #      ['vacuum']['fan_speed']" — translations file has keys not in HA's
  #      schema; addressed in story P7 (translations completeness).
  #
  # Drop `continue-on-error` once the three issues above are resolved.
  # ---------------------------------------------------------------------------
  hassfest:
    name: hassfest (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  # ---------------------------------------------------------------------------
  # flake8 — uses existing .flake8 (max-line-length = 200).
  # ---------------------------------------------------------------------------
  flake8:
    name: flake8
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install flake8
      - run: flake8 custom_components/iaqualink_robots

  # ---------------------------------------------------------------------------
  # mypy — bootstrap config has every module on `ignore_errors = True`.
  # Story P6 ratchets modules off one by one.
  # ---------------------------------------------------------------------------
  mypy:
    name: mypy --strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install mypy
      - run: mypy --config-file=mypy.ini custom_components/iaqualink_robots

  # ---------------------------------------------------------------------------
  # pytest — runs the full suite with coverage. The threshold in
  # pyproject.toml's [tool.coverage.report].fail_under starts low (5%) and
  # is ratcheted up per-story until Platinum's 95% target is met.
  # ---------------------------------------------------------------------------
  pytest:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install test dependencies
        # NB: deliberately NOT `pip install -e .` — Python 3.13 + setuptools 80+
        # editable install has known issues. pyproject.toml's
        # [tool.pytest.ini_options].pythonpath puts the project root on
        # sys.path so `from custom_components.iaqualink_robots import ...`
        # resolves naturally.
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "pytest>=8.0" \
            "pytest-asyncio>=0.23" \
            "pytest-cov>=5.0" \
            "pytest-homeassistant-custom-component>=0.13.190" \
            "aioresponses>=0.7.6"
      - name: Run tests
        run: pytest
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: warn
