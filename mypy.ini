; Bootstrap mypy config for the platinum strict-typing path.
;
; Story P2 turns mypy on in CI. Story P6 ratchets ignore_errors off
; file-by-file. Until then, every module is ignored so CI stays green
; while we add type hints incrementally.
;
; Procedure for P6 ratchet:
;   1. Pick one module (start with const.py — smallest)
;   2. Add `from __future__ import annotations` at the top
;   3. Type every signature in the module
;   4. Flip its `ignore_errors = False` here
;   5. Run `mypy --strict custom_components/iaqualink_robots` until clean

[mypy]
python_version = 3.13
; Explicit package-base treats the project root (CWD) as the base; this stops
; mypy from walking up the filesystem and inventing module-name prefixes from
; `C:\Users\...` directories.
mypy_path = .
explicit_package_bases = True
namespace_packages = True
strict = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
no_implicit_optional = True

; -- Bootstrap: ignore every module until P6 ratchets it on -------------------
; Note: `__init__.py` is reached as the package itself, NOT as `.__init__`.

[mypy-custom_components.iaqualink_robots]
ignore_errors = True

[mypy-custom_components.iaqualink_robots.const]
ignore_errors = True

[mypy-custom_components.iaqualink_robots.config_flow]
ignore_errors = True

[mypy-custom_components.iaqualink_robots.coordinator]
ignore_errors = True

[mypy-custom_components.iaqualink_robots.vacuum]
ignore_errors = True

[mypy-custom_components.iaqualink_robots.sensor]
ignore_errors = True

[mypy-custom_components.iaqualink_robots.button]
ignore_errors = True

[mypy-custom_components.iaqualink_robots.device]
ignore_errors = True

[mypy-custom_components.iaqualink_robots.diagnostics]
ignore_errors = True

; Story P3 — typed runtime_data alias module.
[mypy-custom_components.iaqualink_robots.types]
ignore_errors = True

; Story R25 — per-device protocol strategy modules. ``protocols/__init__.py``
; is reached as ``custom_components.iaqualink_robots.protocols`` (package
; itself), ``protocols/base.py`` and per-family modules follow the standard
; dotted path. P6 ratchets each off individually as the typing lands.
[mypy-custom_components.iaqualink_robots.protocols]
ignore_errors = True

[mypy-custom_components.iaqualink_robots.protocols.base]
ignore_errors = True

[mypy-custom_components.iaqualink_robots.protocols.common]
ignore_errors = True

[mypy-custom_components.iaqualink_robots.protocols.cyclobat]
ignore_errors = True

[mypy-custom_components.iaqualink_robots.protocols.cyclonext]
ignore_errors = True

[mypy-custom_components.iaqualink_robots.protocols.vortrax]
ignore_errors = True

[mypy-custom_components.iaqualink_robots.protocols.vr]
ignore_errors = True

; -- Third-party libs without type stubs we don't control --------------------

[mypy-voluptuous]
ignore_missing_imports = True

[mypy-aioresponses]
ignore_missing_imports = True
